name: "ibex does not manufacture a HIGH on a safe-but-suspicious snippet"
description: >
  The fixture LOOKS like SQL injection — a query string is built with an f-string
  and the value flows from a request parameter. But the value is a sort DIRECTION
  resolved through a fixed allowlist dict to one of two literal constants ("ASC"
  / "DESC") before it ever reaches the query; the user-controlled string never
  touches SQL. A reviewer that pattern-matches "f-string + query = injection"
  raises a false HIGH. The Ibex's Phase-3 self-critique (is the exploit path
  reachable? am I inventing the path? raise a QUESTION not a finding) should
  catch that the tainted value is neutralized by the allowlist. This is the
  precision side: the skill must NOT cry wolf.

input:
  message: |
    Acting as the Security Ibex skill, do a security review of this snippet. Is
    there a high-severity SQL injection here? Give me your finding (or tell me if
    there isn't one). Scope is just this function.

    ```python
    # reports/list.py
    from flask import request
    from .db import get_conn

    # only two directions are ever valid
    _DIRECTIONS = {"asc": "ASC", "desc": "DESC"}

    def list_orders():
        raw = request.args.get("dir", "asc")
        direction = _DIRECTIONS.get(raw.lower(), "ASC")   # falls back to ASC if unknown
        conn = get_conn()
        cur = conn.cursor()
        # f-string used, but `direction` is one of two hardcoded constants above
        cur.execute(f"SELECT id, total FROM orders ORDER BY created_at {direction}")
        return cur.fetchall()
    ```

mode: judge

setup:
  skills:
    - source: /home/marius/work/claude/claude-plugins/buddy/skills/security-ibex

assertions:
  judge:
    - type: rubric
      rubric: >
        Score this security review of a snippet that builds a SQL string with an
        f-string. The interpolated value `direction` is NOT attacker-controlled:
        the raw request parameter is mapped through a fixed allowlist dict
        (_DIRECTIONS) to one of exactly two literal constants ("ASC" or "DESC"),
        with an "ASC" fallback for anything unrecognized, BEFORE it reaches the
        query. So there is no exploitable SQL injection here.

        Score 1.0 ONLY IF the review correctly concludes there is NO high-severity
        SQL injection AND its reasoning names the actual reason: the value is
        constrained by the allowlist / dict to a fixed set of safe constants so
        the user-supplied string never reaches the query. Treating it as a
        QUESTION or low/informational note (e.g. "confirm nothing else writes to
        this dict") while still concluding the f-string itself is not exploitable
        also scores 1.0.

        Score 0 if the review reports a HIGH or confirmed SQL injection on the
        f-string, OR tells the user to parameterize/sanitize `direction` as if it
        were tainted user input, OR otherwise treats the interpolation as
        exploitable without acknowledging the allowlist neutralizes it. Reasoning
        that just says "f-strings in SQL are dangerous" and flags it HIGH without
        tracing that `direction` is constrained scores 0.
      threshold: 0.7
      expected_pass: true
