name: "recon scouts the seam, catches plan drift, captures it as F-3 with a monotonic ID"
description: >
  A seam-contact edit task: the plan asserts the code has a field that the
  actual source does NOT have. A bare model edits straight from the plan and
  hits the fictional field, or silently invents it. The reconnaissance skill
  scouts the real shape FIRST (reads the struct), states the plan-vs-reality
  gap, and externalizes it as an F-N session-log entry — and the ID must be the
  next monotonic integer (F-3, because the seeded tracker already has F-1 and
  F-2), with the anchored entry shape. A pass here can only come from the skill:
  a bare model has no notion of an F-N tracker, monotonic-ID allocation, or the
  scout-before-edit ordering. The fixture supplies the tracker (the skill's
  MCP-backed librarian tracker is stripped by the isolated profile — see README,
  L-7 partial control).

input:
  message: |
    Implement Task 1 of the auth-refactor plan below in this repo, then record
    any reconnaissance finding in the work-stream session log.

    PLAN — Task 1: In src/session.py, make `SessionToken.expired()` return True
    once the token is past its deadline. Use the token's `.expiry_ts` field
    (a unix timestamp) versus the current time. The plan's test asserts
    `tok.expired() is True` for a stale token.

    Before you edit, the tracker docs/trackers/auth-refactor-session-log.md is
    the work stream's session log; honor its existing F-N / W-N entries.

mode: judge

setup:
  skills:
    - source: /home/marius/work/claude/claude-plugins/codescout-companion/skills/reconnaissance
  files:
    src/session.py: |
      """Session token model. Stable contract: see tests/test_session.py."""
      import time
      from dataclasses import dataclass


      @dataclass
      class SessionToken:
          token: str
          # NOTE: the deadline field is `deadline_unix`, NOT `expiry_ts`.
          # `expiry_ts` does not exist on this struct.
          deadline_unix: int

          def remaining(self) -> int:
              return self.deadline_unix - int(time.time())

      # `expired()` is not implemented yet — Task 1 adds it.
    tests/test_session.py: |
      import time
      from src.session import SessionToken


      def test_expired_true_for_stale():
          tok = SessionToken(token="x", deadline_unix=int(time.time()) - 10)
          assert tok.expired() is True


      def test_expired_false_for_fresh():
          tok = SessionToken(token="x", deadline_unix=int(time.time()) + 10)
          assert tok.expired() is False
    docs/trackers/auth-refactor-session-log.md: |
