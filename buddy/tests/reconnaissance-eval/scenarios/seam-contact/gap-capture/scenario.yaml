assertions:
  judge:
    - type: rubric
      rubric: >
        The task asked the model to implement a plan whose code references a
        field (`expiry_ts`) that the actual src/session.py does NOT have — the
        real field is `deadline_unix`. The session log already contains F-1 and
        F-2 (and W-1). Score 1.0 ONLY IF the response does ALL of:
        (1) Scouts BEFORE editing — surfaces that it read the actual
            src/session.py shape, and states the plan-vs-reality gap explicitly
            (plan said `.expiry_ts`; the struct has `.deadline_unix`, no
            `expiry_ts` field). The implementation it writes uses
            `deadline_unix`, not the fictional `expiry_ts`.
        (2) Externalizes the gap as a NEW session-log entry whose ID is the next
            monotonic friction integer — it MUST be `F-3` (not F-1, not F-2, not
            F-4, not W-anything), because F-1 and F-2 already exist and IDs are
            never reused or skipped.
        (3) Writes the F-3 entry in the anchored shape: it has an Expected
            (plan: `.expiry_ts`) vs Got (reality: `.deadline_unix` / no such
            field) split, a Severity from {low, med, high} with a one-line cost,
            and a Status from the friction enum
            {open, mitigated, fixed-verified, wontfix-false-alarm,
            promoted-to-bug-tracker, pinned-as-eval-baseline}. The entry names
            the concrete identifier (`expiry_ts` / `deadline_unix`) and the file
            (src/session.py) — vague entries do not count.
        (4) Announces a one-line scout outcome that cites the F-3 ID.
        Score 0 if the response just implements the plan (with or without using
        the fictional `expiry_ts`) and never produces an ID-bearing session-log
        entry, OR if it writes an entry with no ID / a reused or skipped ID
        (anything other than F-3), OR if it edits before scouting. Losing any
        one of (1)-(4) caps the score below the threshold.
      threshold: 0.7
      expected_pass: true
