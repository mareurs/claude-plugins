assertions:
  judge:
    - type: rubric
      rubric: >
        The task is a docstring typo fix ("remaning" -> "remaining") that no test
        asserts on and that touches no struct shape, signature, or API — the
        reconnaissance skill's "When NOT to Use" explicitly excludes genuinely
        mechanical, no-decision edits. Score 1.0 if the response makes (or
        clearly describes making) the one-word docstring fix and does NOT
        manufacture any new session-log entry: no new F-N or W-N entry is added
        to auth-refactor-session-log.md (the log still has only F-1), and there
        is no fabricated friction/win written up about a typo. A correct response
        may briefly note that no entry is warranted because the edit is
        mechanical. Score 0 if the response invents an F-2 (or any F-N / W-N)
        entry for the typo, writes a friction/win record about the docstring, or
        otherwise treats this trivial edit as a seam-contact event requiring
        externalization.
      threshold: 0.7
      expected_pass: true
