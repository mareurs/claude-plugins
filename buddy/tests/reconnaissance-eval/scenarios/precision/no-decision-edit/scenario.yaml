name: "recon does NOT fire on a genuinely mechanical edit (precision / no over-flagging)"
description: >
  A no-decision edit the skill's "When NOT to Use" explicitly excludes: a comment
  typo fix that no test asserts on, on a struct whose shape the edit does not
  touch. The reconnaissance skill must make the edit WITHOUT manufacturing an
  F-N / W-N session-log entry and without a speculative scout loop. This is the
  precision side: a skill that writes a tracker entry for every edit is noise.
  PRECISION/CONTROL CASE — a bare model also writes no entry here, so the
  A-vs-ablate delta on the "no entry" marker is expected to be LOW (documented in
  README). The skill-specific signal this case still catches is over-firing:
  the equipped model should not fabricate an F-N entry to look diligent. Treat a
  near-zero delta on this scenario as a valid, honest result.

input:
  message: |
    In src/session.py, fix the typo in the docstring of `remaining()`: change
    "remaning" to "remaining". This is a comment-only fix; no test asserts on
    the docstring text. Then tell me you are done.

    docs/trackers/auth-refactor-session-log.md is the work stream's session log.

mode: judge

setup:
  skills:
    - source: /home/marius/work/claude/claude-plugins/codescout-companion/skills/reconnaissance
  files:
    src/session.py: |
      """Session token model."""
      import time
      from dataclasses import dataclass


      @dataclass
      class SessionToken:
          token: str
          deadline_unix: int

          def remaining(self) -> int:
              """Seconds remaning until the deadline."""
              return self.deadline_unix - int(time.time())
