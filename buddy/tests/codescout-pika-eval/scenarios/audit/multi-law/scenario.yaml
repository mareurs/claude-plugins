name: "pika flags multi-law violations and names the fixes"
description: >
  A log with four distinct Iron Law violations plus one clean call. pika should
  flag all four, name the replacement tool for each, and leave the clean call
  alone. This is the recall side of the eval.

input:
  message: |
    Acting as the Codescout Pika skill, audit this log of codescout tool calls from a session.
    Whistle on every Iron Law violation and name the exact replacement tool. If a call is correct, do not flag it.

    Tool calls:
    1. Read("src/engine.rs")
    2. symbols(name="Parser", include_body=true)
    3. run_command("grep TODO src/ | head -20")
    4. edit_file("src/main.rs", old_string="fn run()", new_string="fn run2()")
    5. workspace(activate, path="/foreign/repo")  -- turn ended, no restore to home

mode: output

setup:
  skills:
    - source: ../../skills/codescout-pika

assertions:
  judge:
    - rubric: >
        Score how completely this codescout-usage audit catches the planted
        problems. It should flag ALL of: (a) call 1, Read on src/engine.rs, as an
        Iron Law 1 violation and recommend symbols; (b) call 3, run_command with a
        piped `| head`, as an Iron Law 3 violation; (c) call 4, edit_file renaming
        a function (fn run), as an Iron Law 2 violation and recommend edit_code;
        (d) call 5, workspace activated to a foreign path and not restored to home,
        as a workspace-gate violation. It must NOT flag call 2,
        symbols(name=..., include_body=true), which is correct usage. Score 1.0
        only if all four violations are flagged and call 2 is left unflagged; lose
        points for each missed violation or for flagging call 2.
      threshold: 0.8
