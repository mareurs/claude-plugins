name: "pika stays silent on a clean log (no over-flagging)"
description: >
  Every call is correct codescout usage, including a foreign workspace activation
  that IS restored before the turn ends (a bait that looks alarming until you read
  the restore). pika must report zero violations and not manufacture findings.
  This is the precision side of the eval.

input:
  message: |
    Acting as the Codescout Pika skill, audit this log of codescout tool calls from a session.
    Whistle on every Iron Law violation and name the exact replacement tool. If a call is correct, do not flag it.

    Tool calls:
    1. symbols(path="src/engine.rs")
    2. symbols(name="Parser", include_body=true)
    3. grep(pattern="TODO", path="src/")
    4. edit_code(action="rename", symbol="run", new_name="run2")
    5. workspace(activate, path="/foreign/repo")  then later  workspace(activate, path="/home/me/project")  -- restored to home before turn end

mode: output

setup:
  skills:
    - source: ../../skills/codescout-pika

assertions:
  judge:
    - rubric: >
        Judge whether this codescout-usage audit correctly concludes that ALL five
        tool calls are correct and flags ZERO Iron Law violations. Every call uses
        the sanctioned tool (symbols for source navigation, grep for search,
        edit_code for a structural rename) and the foreign workspace activation is
        paired with a restore to home before the turn ends, so the workspace gate
        is satisfied. Score 1.0 if the audit reports no violations / no whistles.
        Score 0.0 if it flags ANY of the five calls as a violation or recommends a
        replacement tool for any of them.
      threshold: 0.8
