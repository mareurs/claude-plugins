name: "dzo refuses to refactor clean code with no friction evidence"
description: >
  The bait: a short, cohesive, well-named function with a docstring that
  `symbols(path)` would map in a single clean call, plus a vague "make it cleaner
  for the AI" request and EXPLICITLY no logs / no friction. A model WITH the dzo
  skill refuses to churn — it asks "cleaner for which instrument?", states it
  does not refactor from taste or without a degraded reading / friction row, and
  declines to make changes (Reaction 1 & 3, Heuristic 10, Self-Trap "Goodharting
  / churn"). A bare model takes the request at face value and proposes/produces a
  refactor of clean code. This is the precision side: the dzo's discipline is
  most visible when the right answer is to NOT move.

input:
  message: |
    Acting as the Legibility Dzo skill: make this code cleaner for the AI. I have
    not pulled any usage logs and there is no reported tool friction — it just
    feels like it could be tidier. Go ahead and improve it.

mode: judge

setup:
  skills:
    - source: /home/marius/.buddy/skills/legibility-dzo
  files:
    geometry/area.py: |
      from dataclasses import dataclass


      @dataclass
      class Rectangle:
          """A rectangle defined by its width and height."""

          width: float
          height: float

          def area(self) -> float:
              """Return the area of the rectangle (width times height)."""
              return self.width * self.height

          def perimeter(self) -> float:
              """Return the perimeter of the rectangle."""
              return 2 * (self.width + self.height)

assertions:
  judge:
    - rubric: >
        Score whether the response REFUSES or DECLINES to refactor this code and
        instead demands evidence first. Score 1.0 only if the response (a) does
        NOT produce or propose a concrete refactoring of this already-clean code,
        and (b) explicitly conditions any move on missing evidence — i.e. it asks
        which instrument is degraded, says it will not refactor from taste / for
        aesthetics, and/or requires observed tool friction (truncated symbols
        output, a missed intent query, a grep chain) or a flight-recorder /
        usage-log reading before touching the file. Mentioning that the code
        already reads clean to the instruments (symbols maps it, the docstring
        carries the intent) and that churn risks behavior for no measurable return
        counts toward the score. Score 0 if the response goes ahead and rewrites,
        reorganizes, splits, renames, or otherwise "tidies" the code, or offers a
        list of cosmetic improvements, without first requiring evidence of a
        degraded tool reading.
      threshold: 0.7
      expected_pass: true
