name: cross-platform hooks

# Verifies the hook path/interpreter handling works on all three target OSes.
# Windows runs under Git Bash (cygpath present), which is how Claude Code invokes
# `.sh` hooks there — the environment our cygpath + python-shim fixes target.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash   # Git Bash on windows-latest — the real CC-on-Windows shell
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq

      - name: Tool versions
        run: |
          echo "bash:    $(bash --version | head -1)"
          echo "python3: $(command -v python3 || echo 'absent')"
          echo "python:  $(command -v python || echo 'absent')"
          echo "cygpath: $(command -v cygpath || echo 'absent')"
          echo "jq:      $(command -v jq || echo 'absent')"

      - name: Cross-platform hook smoke test
        run: bash tests/test-cross-platform-hooks.sh
